server {
    listen 80;
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Isso evita o erro 404 ao atualizar a página em apps Quasar/Vue
        try_files $uri $uri/ /index.html;
    }

    # Erros comuns redirecionam para o index para o JS lidar
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}