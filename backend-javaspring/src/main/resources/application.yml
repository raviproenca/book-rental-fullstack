spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/locadoradb
    username: postgres
    driver-class-name: org.postgresql.Driver

  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080